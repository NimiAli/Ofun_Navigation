<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具中心</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        color: #fff;
        padding: 24px;
    }
    .page-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; text-align: center; }
    .page-sub { font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 36px; text-align: center; }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 24px;
        max-width: 760px;
        width: 100%;
    }
    .card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        padding: 36px 28px;
        text-align: center;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
        display: flex;
        flex-direction: column;
    }
    .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
    }
    .card h2 { font-size: 20px; margin-bottom: 10px; font-weight: 700; }
    .card p { font-size: 13px; line-height: 1.7; color: rgba(255, 255, 255, 0.82); margin-bottom: 24px; flex: 1; }

    .btn {
        display: inline-block;
        background: #fff;
        color: #4f46e5;
        text-decoration: none;
        padding: 12px 32px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 700;
        transition: transform .15s, box-shadow .15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2); }

    .foot { margin-top: 32px; font-size: 11px; color: rgba(255, 255, 255, 0.55); }
</style>
</head>
<body>
    <div class="page-title">工具中心</div>
    <div class="page-sub">选择你要使用的工具</div>

    <div class="grid">
        <div class="card">
            <div class="icon">🧾</div>
            <h2>Invoice Generator</h2>
            <p>生成 Proforma / Commercial Invoice 和 Packing List，支持 Logo、产品图、自动描述模板和打印导出 PDF。</p>
            <a class="btn" href="Invoice-Generator.html">开始制作发票 →</a>
        </div>

        <div class="card">
            <div class="icon">📦</div>
            <h2>唛头生成器</h2>
            <p>快速制作出口包装唛头（Shipping Marks），规范标注收货信息、箱号、毛净重和尺寸，支持打印导出。</p>
            <a class="btn" href="Mark-Generator.html">开始制作唛头 →</a>
        </div>
    </div>

    <div class="foot">Powered by Tool Center</div>
</body>
</html>
